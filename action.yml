name: UB Review branch repair handoff

description: Temporary read-only source handoff for PR 758.

inputs:
  config:
    description: Compatibility input.
    required: false
    default: ''
  profile:
    description: Compatibility input.
    required: false
    default: gh-runner
  runtime-profile:
    description: Compatibility input.
    required: false
    default: ''
  mode:
    description: Compatibility input.
    required: false
    default: intelligent-ci
  run-pass:
    description: Compatibility input.
    required: false
    default: auto
  allow-heavy:
    description: Compatibility input.
    required: false
    default: 'false'
  root:
    description: Compatibility input.
    required: false
    default: .
  base:
    description: Compatibility input.
    required: false
    default: origin/main
  out:
    description: Output directory.
    required: false
    default: target/ub-review
  github-token:
    description: Compatibility input.
    required: false
    default: ''
  posting:
    description: Compatibility input.
    required: false
    default: artifact-only
  model-mode:
    description: Compatibility input.
    required: false
    default: off
  depth:
    description: Compatibility input.
    required: false
    default: standard
  minimax-api-key:
    description: Compatibility input.
    required: false
    default: ''
  minimax-provider-kind:
    description: Compatibility input.
    required: false
    default: anthropic
  minimax-model:
    description: Compatibility input.
    required: false
    default: MiniMax-M3
  opencode-api-key:
    description: Compatibility input.
    required: false
    default: ''
  opencode-model:
    description: Compatibility input.
    required: false
    default: mimo-v2.5
  opencode-endpoint-kind:
    description: Compatibility input.
    required: false
    default: auto

runs:
  using: composite
  steps:
    - name: Compile source handoff
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"
        mkdir -p "${{ inputs.out }}/source-handoff"
        python3 scripts/pr758_handoff.py
