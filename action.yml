name: UB Review

description: >-
  Build a box-aware UB/native-boundary evidence packet, run bounded model review
  lanes when configured, and optionally post one grouped pull request review.

branding:
  icon: search
  color: yellow

inputs:
  preset:
    description: Repo preset. Currently `bun-ub` is the production/default preset.
    default: bun-ub
    required: false
  profile:
    description: Box profile. Use `gh-runner` on GitHub-hosted runners.
    default: gh-runner
    required: false
  runtime-profile:
    description: Runtime profile for box budgets and local work limits. Overrides profile when set.
    default: ''
    required: false
  root:
    description: Repository root to inspect.
    default: .
    required: false
  base:
    description: Base ref, usually an origin remote branch for the PR target.
    default: origin/main
    required: false
  head:
    description: Head ref.
    default: HEAD
    required: false
  out:
    description: Output directory for the packet.
    default: target/ub-review
    required: false
  install-tools:
    description: Best-effort install of advisory sensors.
    default: 'true'
    required: false
  tool-bundle:
    description: 'Sensor bundle to install: none, core, bun-fast, or full.'
    default: core
    required: false
  setup-rust:
    description: Install/select Rust 1.95.0 with rustup when available.
    default: 'true'
    required: false
  install-mode:
    description: 'Runner install mode for ub-review itself: auto, release, source, or path.'
    default: auto
    required: false
  binary-path:
    description: Existing ub-review binary path when install-mode=path.
    default: ''
    required: false
  release-version:
    description: Release tag to download when install-mode=release. Defaults to the action ref.
    default: ''
    required: false
  release-asset:
    description: GitHub release asset name for the Linux x64 ub-review archive.
    default: ub-review-x86_64-unknown-linux-gnu.tar.gz
    required: false
  allow-heavy:
    description: Allow heavy witnesses such as tests/builds/Miri/mutation. Disabled by default.
    default: 'false'
    required: false
  posting:
    description: 'Posting mode: artifact-only or review.'
    default: review
    required: false
  mode:
    description: 'Execution mode: review-direct, agent-investigate, or agent-patch. Only review-direct is implemented in v0.'
    default: review-direct
    required: false
  github-token:
    description: GitHub token with pull-request write permission when posting=review.
    default: ''
    required: false
  minimax-api-key:
    description: MiniMax provider API key for MiniMax M3 lanes.
    default: ''
    required: false
  minimax-api-url:
    description: Optional MiniMax API URL override.
    default: ''
    required: false
  minimax-provider-kind:
    description: 'MiniMax request/response family: anthropic or openai.'
    default: anthropic
    required: false
  minimax-model:
    description: MiniMax model name.
    default: MiniMax-M3
    required: false
  opencode-api-key:
    description: OpenCode Go API key for optional direct provider lanes.
    default: ''
    required: false
  opencode-api-url:
    description: Optional OpenCode Go API URL override.
    default: ''
    required: false
  opencode-model:
    description: OpenCode Go model for the canary lane.
    default: minimax-m3
    required: false
  opencode-endpoint-kind:
    description: 'OpenCode Go endpoint family: auto, openai-chat, or anthropic-messages.'
    default: auto
    required: false
  model-mode:
    description: 'Model mode: auto or off.'
    default: auto
    required: false
  depth:
    description: 'Review depth selector: quick, standard, or deep.'
    default: standard
    required: false
  lanes:
    description: Comma-separated lane IDs to run. Empty uses the selected depth default.
    default: ''
    required: false
  except-lanes:
    description: Comma-separated lane IDs to skip after applying lanes.
    default: ''
    required: false
  tools:
    description: Comma-separated sensor/tool IDs to plan. Empty uses the profile default.
    default: ''
    required: false
  except-tools:
    description: Comma-separated sensor/tool IDs to skip after applying tools.
    default: ''
    required: false
  provider-policy:
    description: 'Provider policy: minimax-primary, minimax-only, opencode-go-canary, opencode-go-wide, or auto.'
    default: minimax-primary
    required: false
  lane-width:
    description: 'Bun model lane width: 6, 10, or 20.'
    default: '10'
    required: false
  model-timeout-sec:
    description: Per-model-call timeout in seconds.
    default: '300'
    required: false
  max-inline-comments:
    description: Maximum validated inline comments in the grouped PR review.
    default: '8'
    required: false
  model-concurrency:
    description: Planned model lane concurrency.
    default: '8'
    required: false
  max-model-calls:
    description: Maximum model calls for review generation.
    default: '14'
    required: false
  review-body-max-bytes:
    description: Maximum bytes for the grouped PR review body.
    default: '60000'
    required: false
  ledger-path:
    description: Optional read-only UB ledger path to include in shared context.
    default: ''
    required: false
  ledger-max-bytes:
    description: Maximum UB ledger context bytes.
    default: '65536'
    required: false
  pr-thread-context:
    description: Optional file containing bounded PR thread context, prior replies, or proof receipts to seed into shared context.
    default: ''
    required: false
  pr-thread-context-max-bytes:
    description: Maximum PR thread context bytes.
    default: '65536'
    required: false
  fail-on-post-error:
    description: Fail the action when posting the grouped PR review fails.
    default: 'false'
    required: false
  github-summary:
    description: Append running-summary.md to GITHUB_STEP_SUMMARY.
    default: 'true'
    required: false

outputs:
  out:
    description: Output directory containing the UB review packet.
    value: ${{ inputs.out }}
  summary-path:
    description: Path to the running summary markdown.
    value: ${{ steps.paths.outputs.summary-path }}
  events-path:
    description: Path to the append-only event log.
    value: ${{ steps.paths.outputs.events-path }}
  review-json-path:
    description: Path to the internal review artifact.
    value: ${{ steps.paths.outputs.review-json-path }}
  metrics-json-path:
    description: Path to the review metrics artifact.
    value: ${{ steps.paths.outputs.metrics-json-path }}
  github-review-path:
    description: Path to the GitHub review payload artifact.
    value: ${{ steps.paths.outputs.github-review-path }}
  post-result-path:
    description: Path to the successful grouped review post receipt.
    value: ${{ steps.paths.outputs.post-result-path }}
  post-error-path:
    description: Path to the grouped review post error receipt.
    value: ${{ steps.paths.outputs.post-error-path }}
  post-payload-path:
    description: Path to the exact grouped review payload submitted to GitHub.
    value: ${{ steps.paths.outputs.post-payload-path }}
  post-stdout-path:
    description: Path to the GitHub review post response body artifact.
    value: ${{ steps.paths.outputs.post-stdout-path }}
  post-stderr-path:
    description: Path to the GitHub review post stderr artifact.
    value: ${{ steps.paths.outputs.post-stderr-path }}

runs:
  using: composite
  steps:
    - name: Select Rust toolchain
      if: inputs['setup-rust'] == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if command -v rustup >/dev/null 2>&1; then
          rustup toolchain install 1.95.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup default 1.95.0
        elif ! command -v cargo >/dev/null 2>&1; then
          echo "::error::cargo is unavailable and rustup is not installed"
          exit 1
        else
          echo "::warning::rustup unavailable; using existing cargo/rustc"
        fi

    - name: Resolve ub-review runner
      id: runner
      shell: bash
      env:
        UB_REVIEW_INSTALL_MODE: ${{ inputs['install-mode'] }}
        UB_REVIEW_BINARY_PATH: ${{ inputs['binary-path'] }}
        UB_REVIEW_RELEASE_VERSION: ${{ inputs['release-version'] }}
        UB_REVIEW_RELEASE_ASSET: ${{ inputs['release-asset'] }}
        UB_REVIEW_ACTION_REPOSITORY: ${{ github.action_repository }}
        UB_REVIEW_ACTION_REF: ${{ github.action_ref }}
        UB_REVIEW_SERVER_URL: ${{ github.server_url }}
      run: |
        set -euo pipefail

        mode="${UB_REVIEW_INSTALL_MODE:-auto}"
        bin_path="${UB_REVIEW_BINARY_PATH:-}"
        release_version="${UB_REVIEW_RELEASE_VERSION:-${UB_REVIEW_ACTION_REF:-}}"
        release_asset="${UB_REVIEW_RELEASE_ASSET:-ub-review-x86_64-unknown-linux-gnu.tar.gz}"
        action_repo="${UB_REVIEW_ACTION_REPOSITORY:-}"
        server_url="${UB_REVIEW_SERVER_URL:-https://github.com}"

        case "$mode" in
          auto|release|source|path)
            ;;
          *)
            echo "::error::unknown install-mode '$mode'; expected auto, release, source, or path"
            exit 1
            ;;
        esac

        if [[ "$mode" == "path" ]]; then
          if [[ -z "$bin_path" || ! -x "$bin_path" ]]; then
            echo "::error::install-mode=path requires executable binary-path"
            exit 1
          fi
          echo "bin=$bin_path" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$mode" == "auto" ]] && command -v ub-review >/dev/null 2>&1; then
          echo "bin=$(command -v ub-review)" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        build_from_source() {
          # Source mode remains the deterministic fallback. Callers can cache
          # ~/.cargo and CARGO_TARGET_DIR for faster follow-up runs.
          workdir="${RUNNER_TEMP:-/tmp}/ub-review-action-src"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          cp -R "$GITHUB_ACTION_PATH/." "$workdir/"

          echo "::group::Build ub-review from action source"
          cargo generate-lockfile --manifest-path "$workdir/Cargo.toml"
          cargo build --manifest-path "$workdir/Cargo.toml" --locked --release
          echo "::endgroup::"

          if [[ -n "${CARGO_TARGET_DIR:-}" ]]; then
            case "$CARGO_TARGET_DIR" in
              /*)
                cargo_target_dir="$CARGO_TARGET_DIR"
                ;;
              *)
                cargo_target_dir="$PWD/$CARGO_TARGET_DIR"
                ;;
            esac
          else
            cargo_target_dir="$workdir/target"
          fi
          bin="$cargo_target_dir/release/ub-review"
          if [[ ! -x "$bin" ]]; then
            echo "::error::ub-review binary was not produced at $bin"
            exit 1
          fi
          echo "source-dir=$workdir" >> "$GITHUB_OUTPUT"
          echo "bin=$bin" >> "$GITHUB_OUTPUT"
        }

        normalize_release_version() {
          case "$1" in
            refs/tags/*)
              printf '%s\n' "${1#refs/tags/}"
              ;;
            *)
              printf '%s\n' "$1"
              ;;
          esac
        }

        validate_release_request() {
          if [[ "$release_version" =~ [^A-Za-z0-9._-] ]]; then
            echo "::error::release-version must be a simple tag name using letters, numbers, dot, underscore, or dash"
            exit 1
          fi
          if [[ -z "$release_asset" || "$release_asset" == */* || "$release_asset" == *\\* || "$release_asset" == *..* ]]; then
            echo "::error::release-asset must be a file name, not a path"
            exit 1
          fi
          if [[ "$release_asset" =~ [^A-Za-z0-9._-] ]]; then
            echo "::error::release-asset must use only letters, numbers, dot, underscore, or dash"
            exit 1
          fi
        }

        download_release_binary() {
          release_version="$(normalize_release_version "$release_version")"
          if [[ -z "$release_version" ]]; then
            if [[ "$mode" == "auto" ]]; then
              echo "::notice::release binary unavailable; no release-version or action ref is set"
            else
              echo "::warning::release binary unavailable; no release-version or action ref is set"
            fi
            return 1
          fi
          if [[ "$mode" == "auto" && ! "$release_version" =~ ^v[0-9] ]]; then
            echo "::notice::action ref '$release_version' is not a release tag; using source fallback"
            return 1
          fi
          validate_release_request
          if [[ -z "$action_repo" ]]; then
            if [[ "$mode" == "auto" ]]; then
              echo "::notice::release binary unavailable; action repository is unknown"
            else
              echo "::warning::release binary unavailable; action repository is unknown"
            fi
            return 1
          fi
          if [[ "$(uname -s)" != "Linux" || "$(uname -m)" != "x86_64" ]]; then
            if [[ "$mode" == "auto" ]]; then
              echo "::notice::release binary unavailable; only Linux x64 runners are supported"
            else
              echo "::warning::release binary unavailable; only Linux x64 runners are supported"
            fi
            return 1
          fi

          release_dir="${RUNNER_TEMP:-/tmp}/ub-review-action-release"
          archive="$release_dir/$release_asset"
          url="${server_url%/}/$action_repo/releases/download/$release_version/$release_asset"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          echo "::group::Download ub-review release binary"
          if ! curl -fL --retry 3 --retry-delay 2 -o "$archive" "$url"; then
            echo "::endgroup::"
            echo "::warning::release binary download failed; using source fallback"
            return 1
          fi

          case "$release_asset" in
            *.tar.gz|*.tgz)
              if ! tar -xzf "$archive" -C "$release_dir"; then
                echo "::endgroup::"
                echo "::warning::release binary archive extraction failed; using source fallback"
                return 1
              fi
              candidate="$(find "$release_dir" -type f -name ub-review | head -n 1 || true)"
              ;;
            *)
              candidate="$release_dir/ub-review"
              cp "$archive" "$candidate"
              ;;
          esac
          echo "::endgroup::"

          if [[ -z "${candidate:-}" || ! -f "$candidate" ]]; then
            echo "::warning::release binary archive did not contain ub-review; using source fallback"
            return 1
          fi
          chmod +x "$candidate"
          if [[ ! -x "$candidate" ]]; then
            echo "::warning::release binary is not executable; using source fallback"
            return 1
          fi
          echo "release-url=$url" >> "$GITHUB_OUTPUT"
          echo "release-dir=$release_dir" >> "$GITHUB_OUTPUT"
          echo "bin=$candidate" >> "$GITHUB_OUTPUT"
        }

        if [[ "$mode" == "release" || "$mode" == "auto" ]]; then
          if download_release_binary; then
            exit 0
          fi
        fi

        build_from_source

    - name: Install advisory sensors
      if: inputs['install-tools'] == 'true'
      shell: bash
      env:
        UB_REVIEW_TOOL_BUNDLE: ${{ inputs['tool-bundle'] }}
      run: bash "$GITHUB_ACTION_PATH/scripts/install-gh-runner-tools.sh"

    - name: Build UB review packet
      shell: bash
      env:
        UB_REVIEW_PROFILE: ${{ inputs.profile }}
        UB_REVIEW_PRESET: ${{ inputs.preset }}
        UB_REVIEW_MINIMAX_API_KEY: ${{ inputs['minimax-api-key'] }}
        UB_REVIEW_MINIMAX_API_URL: ${{ inputs['minimax-api-url'] }}
        UB_REVIEW_OPENCODE_API_KEY: ${{ inputs['opencode-api-key'] }}
        UB_REVIEW_OPENCODE_API_URL: ${{ inputs['opencode-api-url'] }}
      run: |
        set -euo pipefail
        extra=()
        if [[ "${{ inputs['allow-heavy'] }}" == "true" ]]; then
          extra+=(--allow-heavy)
        fi
        if [[ -n "${{ inputs['runtime-profile'] }}" ]]; then
          extra+=(--runtime-profile "${{ inputs['runtime-profile'] }}")
        fi

        config="$GITHUB_ACTION_PATH/configs/bun-gh-runner.toml"
        case "${{ inputs.preset }}" in
          bun-ub|bun)
            config="$GITHUB_ACTION_PATH/configs/bun-gh-runner.toml"
            ;;
          *)
            echo "::warning::Unknown preset '${{ inputs.preset }}'; using bun-ub"
            ;;
        esac

        "${{ steps.runner.outputs.bin }}" run \
          --config "$config" \
          --profile "${{ inputs.profile }}" \
          --root "${{ inputs.root }}" \
          --base "${{ inputs.base }}" \
          --head "${{ inputs.head }}" \
          --out "${{ inputs.out }}" \
          --posting "${{ inputs.posting }}" \
          --mode "${{ inputs.mode }}" \
          --model-mode "${{ inputs['model-mode'] }}" \
          --depth "${{ inputs.depth }}" \
          --lanes "${{ inputs.lanes }}" \
          --except-lanes "${{ inputs['except-lanes'] }}" \
          --tools "${{ inputs.tools }}" \
          --except-tools "${{ inputs['except-tools'] }}" \
          --provider-policy "${{ inputs['provider-policy'] }}" \
          --lane-width "${{ inputs['lane-width'] }}" \
          --model-timeout-sec "${{ inputs['model-timeout-sec'] }}" \
          --max-inline-comments "${{ inputs['max-inline-comments'] }}" \
          --model-concurrency "${{ inputs['model-concurrency'] }}" \
          --max-model-calls "${{ inputs['max-model-calls'] }}" \
          --minimax-provider-kind "${{ inputs['minimax-provider-kind'] }}" \
          --minimax-model "${{ inputs['minimax-model'] }}" \
          --opencode-model "${{ inputs['opencode-model'] }}" \
          --opencode-endpoint-kind "${{ inputs['opencode-endpoint-kind'] }}" \
          --ledger-path "${{ inputs['ledger-path'] }}" \
          --ledger-max-bytes "${{ inputs['ledger-max-bytes'] }}" \
          --pr-thread-context "${{ inputs['pr-thread-context'] }}" \
          --pr-thread-context-max-bytes "${{ inputs['pr-thread-context-max-bytes'] }}" \
          --review-body-max-bytes "${{ inputs['review-body-max-bytes'] }}" \
          --no-github-summary \
          "${extra[@]}"

    - name: Post grouped PR review
      if: inputs.posting == 'review'
      shell: bash
      env:
        UB_REVIEW_GITHUB_TOKEN: ${{ inputs['github-token'] }}
      run: |
        set -euo pipefail
        extra=()
        if [[ "${{ inputs['fail-on-post-error'] }}" == "true" ]]; then
          extra+=(--fail-on-post-error)
        fi
        "${{ steps.runner.outputs.bin }}" post \
          --review-json "${{ inputs.out }}/review/github-review.json" \
          --diff-patch "${{ inputs.out }}/input/diff.patch" \
          --out "${{ inputs.out }}/review" \
          "${extra[@]}"

    - name: Append UB review summary
      if: always() && inputs['github-summary'] == 'true'
      shell: bash
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "${{ inputs.out }}/running-summary.md" ]; then
          cat "${{ inputs.out }}/running-summary.md" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Set output paths
      id: paths
      if: always()
      shell: bash
      run: |
        echo "summary-path=${{ inputs.out }}/running-summary.md" >> "$GITHUB_OUTPUT"
        echo "events-path=${{ inputs.out }}/events.ndjson" >> "$GITHUB_OUTPUT"
        echo "review-json-path=${{ inputs.out }}/review/review.json" >> "$GITHUB_OUTPUT"
        echo "metrics-json-path=${{ inputs.out }}/review/metrics.json" >> "$GITHUB_OUTPUT"
        echo "github-review-path=${{ inputs.out }}/review/github-review.json" >> "$GITHUB_OUTPUT"
        echo "post-result-path=${{ inputs.out }}/review/post-result.json" >> "$GITHUB_OUTPUT"
        echo "post-error-path=${{ inputs.out }}/review/post-error.json" >> "$GITHUB_OUTPUT"
        echo "post-payload-path=${{ inputs.out }}/review/github-review-post-payload.json" >> "$GITHUB_OUTPUT"
        echo "post-stdout-path=${{ inputs.out }}/review/post-stdout.json" >> "$GITHUB_OUTPUT"
        echo "post-stderr-path=${{ inputs.out }}/review/post-stderr.txt" >> "$GITHUB_OUTPUT"
