schema_version = 1
summary_check = "PR Gate Success"

# Seed contract only. Existing GitHub workflow checks remain authoritative until
# a summary workflow and policy checker land.

[[lane]]
id = "rust-fast-gate"
when = "pull_request"
target_required = true
implemented = true
reason = "Cheap compile, format, lint, and unit-test proof for ordinary Rust PRs."

[[lane]]
id = "policy-gate"
when = "pull_request"
target_required = true
implemented = true
reason = "Policy ledgers and receipt schemas are parsed by cargo xtask policy-check."

[[lane]]
id = "ripr-advisory"
when = "pull_request"
target_required = false
implemented = false
reason = "Static mutation-exposure signal should shift weak-oracle findings left without making every PR pay runtime mutation cost."

[[lane]]
id = "deep-verification"
when = "main/nightly/label"
target_required = false
implemented = false
reason = "Coverage, mutation, fuzz, feature matrix, Docker, and release dry-run lanes stay strong but are label or schedule gated."
