schema_version = 1
msrv = "1.95"

[policy]
panic_free_tests = true
allow_test_carveouts = false
suppression_style = "expect-with-reason"
blanket_categories = false

[[active]]
name = "clippy::dbg_macro"
level = "deny"
reason = "Debug output should not survive into reviewed code anonymously."

[[active]]
name = "clippy::todo"
level = "deny"
reason = "Incomplete implementation must be represented as tracked debt, not executable placeholders."

[[active]]
name = "clippy::unimplemented"
level = "deny"
reason = "Incomplete implementation must be represented as tracked debt, not executable placeholders."

[[active]]
name = "clippy::panic"
level = "deny"
reason = "Panic paths are exceptional control-flow surfaces and need receipts."

[[active]]
name = "clippy::unreachable"
level = "deny"
reason = "Unreachable claims are release-safety claims and need proof."

[[active]]
name = "clippy::unwrap_used"
level = "deny"
reason = "Fallible paths should stay fallible unless a semantic no-panic receipt covers the call site."

[[active]]
name = "clippy::expect_used"
level = "deny"
reason = "Expect messages do not replace structured receipts for panic-family calls."

[[planned]]
name = "clippy::same_length_and_capacity"
level = "deny"
activate_when_msrv = "1.94"
reason = "Catch raw-parts reconstruction mistakes."

[[planned]]
name = "clippy::disallowed_fields"
level = "deny"
activate_when_msrv = "1.95"
reason = "Allow architecture policy to ban direct field access across protected seams."

[[planned]]
name = "clippy::manual_checked_ops"
level = "warn"
activate_when_msrv = "1.95"
reason = "Prefer checked arithmetic over manual divide-by-zero guards."
