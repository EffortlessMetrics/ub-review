# unsafe-review policy
#
# This file defines the default static unsafe-contract review posture for Rust
# repositories. It is advisory by default: unsafe-review reports review evidence
# gaps; repository CI decides when those gaps should block.

[scope]
include = ["**/*.rs"]
exclude = ["target/**", "vendor/**", ".cargo/**"]

[review]
default_posture = "advisory"
question = "Does this unsafe change have the safety contract, guard, test reach, and witness route needed to make review credible?"
non_goals = [
  "prove unsafe Rust soundness",
  "prove UB-free status",
  "replace Miri, sanitizers, tests, or cargo-mutants",
]

[required_evidence]
safety_contract = true
precondition_guard = true
layout_alignment_witness = true
aliasing_lifetime_evidence = true
local_test_reach = true
witness_route = true

[severity]
high_risk_requires_witness_route = true
release_requires_no_unexplained_new_gaps = true
public_crates_require_owner = true

[artifacts]
out_dir = "target/unsafe-review"
files = [
  "cards.json",
  "pr-summary.md",
  "github-summary.md",
  "cards.sarif",
  "comment-plan.json",
  "witness-plan.md",
  "lsp.json",
  "receipt-audit.json",
]
