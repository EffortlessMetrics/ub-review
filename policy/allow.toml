schema_version = "1"
tool = "cargo-allow"

# Default source-tree exception ledger. Keep this consolidated until real
# exception volume proves that narrower ledgers improve reviewability.

[[exception]]
id = "clippy-too-many-arguments-artifact-writers"
kind = "clippy-suppression"
path = "src/main.rs"
lint = "clippy::too_many_arguments"
owner = "ub-review/core"
reason = "Artifact writer functions currently pass explicit packet context while the receipt model settles; refactor after the packet contract is stable."
created = "2026-06-03"
review_after = "2026-07-03"
expires = "2026-12-03"

[[exception]]
id = "non-rust-github-actions"
kind = "non-rust-file"
glob = ".github/workflows/*.yml"
category = "platform-required-workflow"
language = "yaml"
owner = "release/ci"
reason = "GitHub Actions requires workflow YAML; workflow privileges and lane behavior are governed by workflow and CI policy."
created = "2026-06-03"
review_after = "2026-07-03"

[[exception]]
id = "non-rust-docs-and-templates"
kind = "non-rust-file"
glob = "{README.md,docs/**/*.md,templates/**/*.md,REPO_READY.md,RELEASE_NOTES*.md,AGENTS.md,CLAUDE.md,.github/pull_request_template.md,.github/release-notes.md}"
category = "documentation"
language = "markdown"
owner = "ub-review/docs"
reason = "Human and agent operating documentation is intentionally Markdown so GitHub renders it and reviewers can audit it directly."
created = "2026-06-03"
review_after = "2026-09-03"

[[exception]]
id = "non-rust-config-toml"
kind = "non-rust-file"
glob = "{configs,profiles,runtime,policy}/**/*.toml"
category = "configuration-and-policy"
language = "toml"
owner = "ub-review/core"
reason = "Runtime profiles, examples, and policy ledgers are data surfaces that must be easy for humans and agents to diff, validate, and repair."
created = "2026-06-03"
review_after = "2026-09-03"

[[exception]]
id = "non-rust-repo-gate-config"
kind = "non-rust-file"
glob = ".ub-review.toml"
category = "configuration-and-policy"
language = "toml"
owner = "ub-review/core"
reason = "The repo's own gate policy lives at the root .ub-review.toml, the same path consumer repos use, so the dogfood contract is explicit and copyable."
created = "2026-06-06"
review_after = "2026-09-06"

[[exception]]
id = "non-rust-gitattributes"
kind = "non-rust-file"
path = ".gitattributes"
category = "platform-required-config"
language = "gitattributes"
owner = "ub-review/core"
reason = "Git attributes file enforces LF line endings in the index so include_str!()-based contract tests read deterministic bytes on every platform (issue #584)."
created = "2026-06-21"
review_after = "2026-09-21"

[[exception]]
id = "non-rust-ripr-suppressions"
kind = "non-rust-file"
glob = ".ripr/suppressions.toml"
category = "configuration-and-policy"
language = "toml"
owner = "ub-review/core"
reason = "RIPR's durable suppression manifest; every entry carries owner and reason per the suppression-health contract, and suppressed findings stay visible as suppressed in the gate receipt. NOTE: ripr 0.8.0's suppressions schema does not support per-entry created/review_after fields (issue #586), so the dating obligation is carried by this receipt's review_after/expires rather than per-entry. The file's own header documents the rot risk (line-keyed ids break on code motion; >=6 rot instances recorded) and the upstream ripr-swarm#1053/#1054/#1055 work that would enable per-entry dating."
created = "2026-06-07"
review_after = "2026-07-22"
expires = "2026-12-22"

[[exception]]
id = "non-rust-release-scripts"
kind = "non-rust-file"
glob = "scripts/*"
category = "release-tooling"
language = "python/bash"
owner = "release/ci"
reason = "Existing release and smoke wrappers remain for workflow compatibility; durable automation should move toward Rust or xtask-style checks after parity is proven."
created = "2026-06-03"
review_after = "2026-07-03"
expires = "2026-12-03"

[[exception]]
id = "non-rust-fixtures"
kind = "non-rust-file"
glob = "fixtures/**/*"
category = "fixtures"
language = "mixed"
owner = "ub-review/tests"
reason = "Fixture projects and provider payloads are consumed by integration tests and packet-contract checks."
created = "2026-06-03"
review_after = "2026-09-03"

[[exception]]
id = "non-rust-action-metadata"
kind = "non-rust-file"
glob = "action.yml"
category = "platform-required-action-metadata"
language = "yaml"
owner = "release/ci"
reason = "GitHub composite/action metadata must be YAML for consumers of this action."
created = "2026-06-03"
review_after = "2026-09-03"

[[exception]]
id = "non-rust-ast-grep-rules"
kind = "non-rust-file"
glob = "tools/ub-rules/**/*.yml"
category = "external-tool-rules"
language = "yaml"
owner = "ub-review/sensors"
reason = "ast-grep rule packs are YAML because the external tool consumes YAML rule definitions."
created = "2026-06-03"
review_after = "2026-09-03"

[[exception]]
id = "ripr-epic-ceiling-678"
kind = "non-rust-file"
glob = ".ub-review.toml"
category = "temporary-gate-ceiling"
language = "toml"
owner = "ub-review/core"
reason = "Temporary raise of [tools.ripr.gate].max_new_unsuppressed from 0 -> 200 for the cohort-orchestrator epic #678 (Orders 5-9: cohort contract, prefix manifest, persistent lanes, cross-lane messages, the live reporter). These Orders add main.rs code whose field-construction seams ripr's static analysis flags as exposed but which only execute under a full model run; the reporter (Order 9) that would make them discriminated is itself blocked by the strict-zero wall (circular). The documented #538 remedy. REVERT to 0 once Order 9 drives end-to-end model execution. See #678/#687."
created = "2026-06-26"
review_after = "2026-09-26"
expires = "2026-12-26"
