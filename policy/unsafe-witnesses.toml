# unsafe witness routes
#
# These routes describe concrete runtime or test receipts that can support an
# unsafe-review card. They do not prove soundness; they make review evidence
# reachable and auditable.

[[witness]]
id = "example-miri-witness"
enabled = false
scope = "crates/example/src/raw.rs"
kind = "miri"
command = "cargo +nightly miri test -p example example_rejects_unaligned_pointer"
receipt = "target/miri/example_rejects_unaligned_pointer.json"
owner = "unsafe-review-owner"

[[witness]]
id = "example-runtime-witness"
enabled = false
scope = "crates/example/src/raw.rs"
kind = "test"
command = "cargo test -p example example_rejects_unaligned_pointer"
receipt = "target/unsafe-review/witnesses/example_rejects_unaligned_pointer.json"
owner = "unsafe-review-owner"
