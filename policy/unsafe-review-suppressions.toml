# unsafe-review suppressions
#
# Suppressions are for narrow, owned, reviewed exceptions only. Prefer fixing
# the unsafe-contract gap or adding a witness route over suppressing a card.

[[suppression]]
id = "example-unsafe-review-suppression"
enabled = false
path = "crates/example/src/raw.rs"
card = "missing-layout-alignment-witness"
owner = "unsafe-review-owner"
reason = "Example only: replace with the concrete invariant and retained evidence."
evidence = ["doc:docs/safety/example.md", "test:example_rejects_unaligned_pointer"]
review_after = "2026-09-01"
