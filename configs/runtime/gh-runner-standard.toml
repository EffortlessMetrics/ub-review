name = "gh-runner-standard"

[limits]
logical_lanes = 20
llm_in_flight = 16
sensor_jobs = 4
repo_read = 6
raw_file_reads = 6
grep = 3
ast_grep = 2
git = 2
tests = 2
builds = 0
rust_analyzer = 0
summary_writers = 1
patch_writers = 0

[guards]
min_free_mem_mb = 1500
min_free_disk_mb = 4000
max_load_1m = 6.0

[budgets]
artifact_budget_mb = 750
scratch_budget_mb = 4000
default_timeout_sec = 1800
hard_timeout_sec = 3600
proof_max_focused_test_files = 3
proof_max_focused_tests = 1
proof_command_timeout_sec = 300
proof_total_timeout_sec = 600
proof_cpu = 2
proof_memory_mb = 2048
proof_disk_mb = 1024
proof_network = false
proof_scratch = true
mutation = false
sanitizer = false

[trusted_repo]
pass_triggers = ["opened", "ready_for_review"]
synchronize = false
proof_lanes = [
  "focused-tests",
  "base-tests-red-green",
  "actionlint",
  "scoped-source-route-checks",
]

# Per-tool sensor leases this box can afford; an explicit repo-config
# [tools.<id>] timeout_sec still wins (resolve_sensor_timeout_sec).
# ripr needed more than the one-size 240s on a hosted runner
# (run 27102118267 timed out the required ripr sensor at 240s).
[tool_timeouts]
ripr = 720
