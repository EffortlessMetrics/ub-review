name = "cx33"

[limits]
logical_lanes = 24
llm_in_flight = 16
sensor_jobs = 3
repo_read = 6
raw_file_reads = 6
grep = 3
ast_grep = 2
git = 2
tests = 1
builds = 0
rust_analyzer = 0
summary_writers = 1
patch_writers = 1

[guards]
min_free_mem_mb = 1400
min_free_disk_mb = 12000
max_load_1m = 5.0

[budgets]
artifact_budget_mb = 1000
scratch_budget_mb = 16000
default_timeout_sec = 1800
hard_timeout_sec = 3600
proof_max_focused_test_files = 6
proof_max_focused_tests = 4
proof_command_timeout_sec = 450
proof_total_timeout_sec = 1200
proof_cpu = 2
proof_memory_mb = 2048
proof_disk_mb = 1024
proof_network = false
proof_scratch = true
mutation = false
sanitizer = false

[trusted_repo]
pass_triggers = ["opened", "ready_for_review"]
synchronize = false
proof_lanes = [
  "focused-tests",
  "base-tests-red-green",
  "actionlint",
  "scoped-source-route-checks",
]
