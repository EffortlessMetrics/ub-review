name = "gh-runner-full"

[limits]
logical_lanes = 24
llm_in_flight = 18
sensor_jobs = 6
repo_read = 8
raw_file_reads = 8
grep = 4
ast_grep = 3
git = 3
tests = 3
builds = 1
rust_analyzer = 0
summary_writers = 1
patch_writers = 0

[guards]
min_free_mem_mb = 3000
min_free_disk_mb = 12000
max_load_1m = 8.0

[budgets]
artifact_budget_mb = 1500
scratch_budget_mb = 16000
default_timeout_sec = 1800
hard_timeout_sec = 3600
proof_max_focused_test_files = 6
proof_max_focused_tests = 4
proof_command_timeout_sec = 600
proof_total_timeout_sec = 1800
proof_cpu = 4
proof_memory_mb = 4096
proof_disk_mb = 2048
proof_network = false
proof_scratch = true
mutation = true
sanitizer = true

[trusted_repo]
pass_triggers = ["opened", "ready_for_review"]
synchronize = false
proof_lanes = [
  "focused-tests",
  "base-tests-red-green",
  "actionlint",
  "scoped-source-route-checks",
  "targeted-mutation-when-leased",
  "sanitizer-when-leased",
]
