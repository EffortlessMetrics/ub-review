# Bun-specific GitHub runner profile.
# Safe base profile for GitHub-hosted runners. Action inputs decide whether to
# post a grouped PR review and whether provider keys are available for model
# lanes; missing keys remain missing evidence.

review_profile = "bun-ub-v0"
profile = "gh-runner"

[repo]
ledger = ""
base = "origin/main"
head = "HEAD"

[review]
posting_engine = "artifact"
custom_poster = false
ban_standalone_approval = true
require_zero_finding_audit = true
enable_default_lanes = true

[review_body]
include_successful_lane_table = false
include_provider_table = "on_failure"
include_sensor_table = "on_failure"
include_execution_summary = "none"

[gate]
required_check = "ub-review/gate"
target_minutes = 30
hard_timeout_minutes = 60
post_review_on = ["opened", "ready_for_review"]
synchronize_mode = "gate-only"

[tools.ripr.gate]
scope = "on-diff"
max_new_unsuppressed = 0

# Keep the first GH-runner pass lean. Missing commands are already treated as
# explicit missing evidence, but disabling uncommon tools keeps the plan quieter.
[tools.semgrep]
enabled = false

[tools.osv-scanner]
enabled = false

[tools.cargo-audit]
enabled = false

[tools.cargo-deny]
enabled = false

[tools.shellcheck]
enabled = false

[tools.cppcheck]
enabled = false

[tools.zizmor]
enabled = false

[tools.gitleaks]
enabled = false
