# Example consumer config for ub-review on a GitHub-hosted runner.
# Safe base profile for GitHub-hosted runners. Action inputs decide whether to
# post a grouped PR review and whether provider keys are available for model
# lanes; missing keys remain missing evidence.

review_profile = "bun-ub-v0"
profile = "gh-runner"

[repo]
ledger = ""
base = "origin/main"
head = "HEAD"

[review]
posting_engine = "artifact"
custom_poster = false
ban_standalone_approval = true
require_zero_finding_audit = true
enable_default_lanes = true

[review_body]
include_successful_lane_table = false
include_provider_table = "on_failure"
include_sensor_table = "on_failure"
include_execution_summary = "none"
# Posture for the boilerplate suppressor when reviewer-value content survived
# compilation but the rendered PR body was classified as no-value boilerplate:
# - "suppress" (consumer default): withhold the PR post; diagnostics stay in
#   artifacts and github-review-skip.json names this policy and the counts.
# - "post_substantive": post when at least one summary-only finding is
#   substantive (severity medium+ or confidence medium-high+, excluding pure
#   lane-status notes).
# - "post_all": post whenever any summary-only finding exists.
# Unknown values are policy parse errors and become receipted gate reasons.
summary_only_body = "suppress"

[gate]
required_check = "ub-review/gate"
target_minutes = 30
hard_timeout_minutes = 60
# Pull_request event actions (opened, reopened, ready_for_review, synchronize)
# whose passes may post the grouped PR review when posting=review; every other
# pass stays artifact-only and writes a github-review-skip.json receipt.
post_review_on = ["opened", "ready_for_review"]

# Deterministic blocking markers (repo policy receipts, never model output).
# Both default to false; flipping one promotes an already-deterministic
# evidence class to a blocking gate reason.
[gate.blocking]
# A matched [[proof.required]] policy with no passing receipt blocks the gate.
required_proof_unproven = false
# A required tool's configured [tools.*.gate] threshold that could not be
# evaluated (sensor failed/timed out without a verdict, or a missing or
# malformed gate-decision receipt) blocks the gate. Without this opt-in those
# gaps stay advisory.
tool_gate_missing_evidence = false

# Per-tool gate thresholds. A tool can redden the gate only when repo config
# opts it in with a [tools.<id>.gate] table; tools without one never produce
# blocking reasons. `required_if` trigger conditions are expressed with the
# existing per-tool keys: `default = "<trigger>"` decides when the tool runs
# (surfaced as `required_if` in resolved-tools.json and tool-status.json) and
# `required = true` makes a matched trigger's missing evidence blocking in
# intelligent-ci mode. An evaluated threshold that the diff exceeds blocks
# regardless of `required`, because configuring the gate is itself the
# explicit opt-in. A sensor that crashes or times out never evaluated the
# threshold: that is missing evidence, advisory unless [gate.blocking]
# tool_gate_missing_evidence opts required tools into blocking.
# `scope = "on-diff"` is the only supported scope (repo-wide scoping does not
# exist yet).
[tools.ripr.gate]
scope = "on-diff"
max_new_unsuppressed = 0

# Keep the first GH-runner pass lean. Missing commands are already treated as
# explicit missing evidence, but disabling uncommon tools keeps the plan quieter.
[tools.semgrep]
enabled = false

[tools.osv-scanner]
enabled = false

[tools.cargo-audit]
enabled = false

[tools.cargo-deny]
enabled = false

[tools.shellcheck]
enabled = false

[tools.cppcheck]
enabled = false

[tools.zizmor]
enabled = false

[tools.gitleaks]
enabled = false

# ─────────────────────────────────────────────────────────────────────────────
# The three surfaces below are NOT enabled in this lean example, but are shown
# here so consumers can see the schema. Uncomment and adapt to use them. The
# full-feature reference config configs/unsafe-review-swarm.ub-review.toml is
# test-pinned (src/main.rs unsafe_review_swarm_recommended_config_loads_advisory_floor)
# and demonstrates every feature parsing cleanly with zero policy_errors.
# ─────────────────────────────────────────────────────────────────────────────

# Repo-declared review lanes ([[lanes]]). These compose with (or replace) the
# builtin lane set for the matched diff class. Each lane needs an id and a
# role; diff_classes gates which diffs route to it. See SPEC-0011 for the
# lane-doctrine contract.
# [[lanes]]
# id = "spec-honesty"
# role = "Docs claims versus code review"
# diff_classes = ["source-general", "source-ub"]

# Required proof ([[proof.required]]). A matched entry with no passing receipt
# blocks the gate when [gate.blocking].required_proof_unproven = true (or in
# intelligent-ci mode). `command` runs through the proof broker under the
# runtime profile's budget. See SPEC-0003 for the gate contract.
# [[proof.required]]
# id = "cargo-check"
# languages = ["rust"]
# diff_classes = ["all"]
# command = "cargo check --workspace --locked"
# reason = "Required Rust workspace check."
# cost = "focused-build"
# timeout_sec = 300

# Provider policy ([providers]). Controls BYOK model-lane fanout, fallback,
# and per-provider concurrency. env/model/role/models keys are parsed but
# currently documentation of intent (see SPEC-0006); the live keys are
# policy, max_concurrency, and prompt_cache. See SPEC-0002 / SPEC-0006.
# [providers]
# policy = "minimax-primary"
# [providers.minimax]
# max_concurrency = 8
# prompt_cache = "explicit-anthropic"
# [providers.opencode]
# max_concurrency = 4
