# Bun-specific GitHub runner profile.
# Safe base profile for GitHub-hosted runners. Action inputs decide whether to
# post a grouped PR review and whether provider keys are available for model
# lanes; missing keys remain missing evidence.

profile = "gh-runner"

[repo]
ledger = ""
base = "origin/main"
head = "HEAD"

[review]
posting_engine = "artifact"
custom_poster = false
ban_standalone_approval = true
require_zero_finding_audit = true
enable_default_lanes = true

# Keep the first GH-runner pass lean. Missing commands are already treated as
# explicit missing evidence, but disabling uncommon tools keeps the plan quieter.
[tools.semgrep]
enabled = false

[tools.osv-scanner]
enabled = false

[tools.cargo-audit]
enabled = false

[tools.cargo-deny]
enabled = false

[tools.shellcheck]
enabled = false

[tools.cppcheck]
enabled = false

[tools.zizmor]
enabled = false

[tools.gitleaks]
enabled = false
