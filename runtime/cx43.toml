name = "cx43"

[limits]
logical_lanes = 32
llm_in_flight = 24
sensor_jobs = 6
repo_read = 10
raw_file_reads = 10
grep = 6
ast_grep = 4
git = 3
tests = 2
builds = 1
rust_analyzer = 1
summary_writers = 1
patch_writers = 1

[guards]
min_free_mem_mb = 2500
min_free_disk_mb = 20000
max_load_1m = 9.0

[budgets]
artifact_budget_mb = 2000
scratch_budget_mb = 40000
default_timeout_sec = 1800
hard_timeout_sec = 3600
proof_max_focused_test_files = 8
proof_max_focused_tests = 6
proof_command_timeout_sec = 600
proof_total_timeout_sec = 1800
proof_cpu = 4
proof_memory_mb = 4096
proof_disk_mb = 2048
proof_network = false
proof_scratch = true
mutation = true
sanitizer = true

[trusted_repo]
pass_triggers = ["opened", "ready_for_review"]
synchronize = false
proof_lanes = [
  "focused-tests",
  "base-tests-red-green",
  "actionlint",
  "scoped-source-route-checks",
  "targeted-mutation-when-leased",
  "sanitizer-when-leased",
]
