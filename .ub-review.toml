# Repo gate policy for EffortlessMetrics/ub-review (self-dogfood).
# This root config is the explicit contract the gate enforces: one required
# GitHub check (ub-review/gate) runs these proof-stream receipts; the
# standalone CI and coverage workflows are folded into it. Moved from
# profiles/ub-review-self.toml so repo policy lives where consumers put it.

review_profile = "ub-review-self"
profile = "gh-runner-full"

[repo]
kind = "ub-review"
ledger = "docs/REVIEW_LEDGER.md"
base = "origin/main"
head = "HEAD"

# Repo-declared lanes per the lane doctrine
# (docs/specs/UB-REVIEW-SPEC-0011-lane-doctrine.md). All three exist because
# the measured corpus showed the builtin lanes blind to this repo's actual
# defect classes: both 2026-06-06 mirror drifts were caught by CI, never by
# a lane, and ten spec PRs sailed through with one-line reviews.

[[lanes]]
id = "contract-mirror"
role = "Cross-language mirror parity review"
focus = """
For every changed file with a mirrored counterpart (Rust renderer,
serializer, classifier, or noise rule <-> Python verifier expectation; see
the mirror-pair map in docs/REVIEW_LEDGER.md), check whether both sides of
the contract moved together. Cite both file paths and which side moved. If
parity is mechanically checkable (phrase sets, schema strings, count
parity, packet equality), emit a proof request or verification question
naming the deterministic check; never assert or refute parity by argument.
"""

[[lanes]]
id = "gate-semantics"
role = "Gate verdict surface review"
focus = """
When the diff touches what can redden the gate, what stays advisory, or
what posts (gate_outcome construction, reason kinds, [gate] policy keys,
fail-on-gate resolution, pass policy, gate-check), name the affected
branch and the SPEC-0003 clause it must agree with, and check the spec or
doc text still matches the behavior. Provider and model failure paths are
never gate-relevant. Cite the policy key or reason kind, not severity
adjectives.
"""

[[lanes]]
id = "spec-honesty"
role = "Docs claims versus code review"
focus = """
For changed docs and specs, find any claim that presents intent as
implemented behavior: a config key described as wired, a command described
as existing, a threshold described as enforced, a maturity label without a
citation. Cite the claim line and the code (or its absence) that
contradicts it. Mark intent-as-intent phrasing as correct; only
claim-truth, never style or voice.
"""

[review]
posting_engine = "artifact"
custom_poster = false
ban_standalone_approval = true
require_zero_finding_audit = true
enable_default_lanes = true

[review_body]
include_successful_lane_table = false
include_provider_table = "on_failure"
include_sensor_table = "on_failure"
include_execution_summary = "none"
# Dogfood posture: when the boilerplate suppressor would withhold the PR body,
# post it anyway if at least one summary-only finding is substantive (severity
# medium+ or confidence medium-high+, excluding pure lane-status notes). This
# keeps review output visible for calibration without pure-noise bodies.
# Consumer repos keep the conservative "suppress" default.
summary_only_body = "post_substantive"

# Self-gate proof stream: baseline CI commands are sensors so they run inside
# ub-review/gate instead of as independent required PR jobs.
[tools.cargo-fmt]
enabled = true
class = "build"
default = "always"
required = true
weight = 1
timeout_sec = 120
artifact_budget_mb = 32
requires_lease = false

[tools.cargo-check]
enabled = true
class = "build"
default = "always"
required = true
weight = 4
timeout_sec = 600
artifact_budget_mb = 128
requires_lease = false

[tools.cargo-test]
enabled = true
class = "test"
default = "always"
required = true
weight = 8
timeout_sec = 900
artifact_budget_mb = 256
requires_lease = false

[tools.cargo-clippy]
enabled = true
class = "build"
default = "always"
required = true
weight = 6
timeout_sec = 600
artifact_budget_mb = 128
requires_lease = false

[tools.cargo-doc]
enabled = true
class = "build"
default = "always"
required = true
weight = 4
timeout_sec = 600
artifact_budget_mb = 128
requires_lease = false

[tools.artifact-verifier]
enabled = true
class = "static"
default = "always"
required = true
weight = 2
timeout_sec = 120
artifact_budget_mb = 32
requires_lease = false

[tools.tokmd]
enabled = true
class = "packet"
default = "always"
required = false
weight = 2
timeout_sec = 300
artifact_budget_mb = 192
requires_lease = false

[tools.cargo-allow]
enabled = true
class = "static"
default = "source-exception-changed"
required = true
weight = 2
timeout_sec = 120
artifact_budget_mb = 64
requires_lease = false

[tools.ripr]
enabled = true
class = "static"
default = "rust-behavior-or-tests-changed"
required = true
weight = 3
timeout_sec = 240
artifact_budget_mb = 128
requires_lease = false

[tools.unsafe-review]
enabled = true
class = "static"
default = "unsafe-or-native-risk-changed"
required = true
weight = 3
timeout_sec = 240
artifact_budget_mb = 128
requires_lease = false

[tools.ast-grep]
enabled = true
class = "search"
default = "source-changed"
required = true
weight = 1
timeout_sec = 60
artifact_budget_mb = 64
requires_lease = false

[tools.actionlint]
enabled = true
class = "workflow"
default = "workflow-changed"
required = true
weight = 1
timeout_sec = 60
artifact_budget_mb = 32
requires_lease = false

# Coverage stays a leased heavy witness, but this repo leases it on every PR:
# the gate workflow passes allow-heavy and installs cargo-llvm-cov, the sensor
# writes sensors/coverage/lcov.info plus the coverage status receipts, and the
# workflow uploads the lcov receipt to Codecov after the gate step.
[tools.coverage]
enabled = true
class = "coverage"
default = "always"
required = false
weight = 6
timeout_sec = 1800
artifact_budget_mb = 256
requires_lease = true

[tools.semgrep]
enabled = false

[tools.osv-scanner]
enabled = false

[tools.cargo-audit]
enabled = false

[tools.cargo-deny]
enabled = false

[tools.shellcheck]
enabled = false

[tools.cppcheck]
enabled = false

[tools.zizmor]
enabled = false

[tools.gitleaks]
enabled = false

[[proof.required]]
id = "cargo-check"
languages = ["rust"]
diff_classes = ["all"]
command = "cargo check --workspace --all-targets --locked"
reason = "Required Rust workspace check for the ub-review self gate."
cost = "focused-build"
timeout_sec = 600
required = true
enabled = true

[[proof.required]]
id = "cargo-doc"
languages = ["rust"]
diff_classes = ["all"]
command = "cargo doc --workspace --no-deps --locked"
reason = "Required documentation build for the ub-review self gate."
cost = "focused-build"
timeout_sec = 600
required = true
enabled = true

# Policy receipts are TOML/Markdown surfaces, not Rust-only, so this proof
# matches every language mix; it replaces the standalone CI policy step.
[[proof.required]]
id = "policy-check"
languages = ["all"]
diff_classes = ["all"]
command = "cargo xtask policy-check"
reason = "Required repo policy receipt validation for the ub-review self gate."
cost = "focused-build"
timeout_sec = 300
required = true
enabled = true

[gate]
required_check = "ub-review/gate"
target_minutes = 30
hard_timeout_minutes = 60
# Review posting is reserved for the passes where a reviewer first looks at
# the PR; synchronize and reopened passes still run the full gate (every head
# SHA gets a verdict) but stay gate-only so push storms do not become an
# inbox tax. Diagnostics for quiet passes live in artifacts.
post_review_on = ["opened", "ready_for_review"]
synchronize_mode = "gate-only"

[providers]
policy = "primary-with-fallback"

[providers.minimax]
enabled = true
env = "MINIMAX_API_KEY"
model = "MiniMax-M3"
role = "primary"
prompt_cache = "explicit-anthropic"
max_concurrency = 12

[providers.opencode]
enabled = true
env = "OPENCODE"
role = "fallback"
models = ["deepseek-v4-flash", "mimo-v2.5"]
max_concurrency = 8

[tools.ripr.gate]
scope = "on-diff"
max_new_unsuppressed = 0
