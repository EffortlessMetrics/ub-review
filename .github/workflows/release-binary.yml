name: Release Binary

# PR builds are covered by the gate's check/test proof; release packaging is a
# release-lane concern.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-binary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Build release asset
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      ASSET_NAME: ub-review-x86_64-unknown-linux-gnu.tar.gz
      TARGET_DIR: ub-review-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --bin ub-review
          test -x target/release/ub-review
          target/release/ub-review --help >/dev/null

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/$TARGET_DIR"
          install -m 0755 target/release/ub-review "dist/$TARGET_DIR/ub-review"
          tar -czf "dist/$ASSET_NAME" -C "dist/$TARGET_DIR" ub-review
          sha256sum "dist/$ASSET_NAME" > "dist/$ASSET_NAME.sha256"
          tar -tzf "dist/$ASSET_NAME" | grep -Fx ub-review
          test -s "dist/$ASSET_NAME.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ub-review-linux-x64-release
          path: |
            dist/${{ env.ASSET_NAME }}
            dist/${{ env.ASSET_NAME }}.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish release asset
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      ASSET_NAME: ub-review-x86_64-unknown-linux-gnu.tar.gz
    steps:
      - name: Validate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-}"
          if [[ ! "$tag" =~ ^v[0-9][A-Za-z0-9._-]*$ ]]; then
            echo "::error::release tag must start with v plus a digit and contain only letters, numbers, dot, underscore, or dash"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download packaged release asset
        uses: actions/download-artifact@v7
        with:
          name: ub-review-linux-x64-release
          path: dist

      - name: Publish GitHub release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "dist/$ASSET_NAME" "dist/$ASSET_NAME.sha256" --clobber
          else
            gh release create "$TAG" "dist/$ASSET_NAME" "dist/$ASSET_NAME.sha256" \
              --verify-tag \
              --title "$TAG" \
              --notes "ub-review $TAG"
          fi
