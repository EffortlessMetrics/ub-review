name: Debug PR 758 finish run

on:
  push:
    branches: [feat/review-experience-contract]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-24.04
    steps:
      - name: Report finish run state
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const head = 'f5d3bdab9d4eac7f032ea4aac789580906b6cd16';
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: head,
              per_page: 100,
            });
            const lines = [`## PR 758 finish-run inspection`, ``, `Head: \`${head}\``];
            for (const run of runs) {
              lines.push(`- ${run.name}: run ${run.id}, ${run.status}/${run.conclusion ?? 'pending'}, event=${run.event}`);
              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              });
              for (const job of jobs) {
                const failed = job.steps?.filter(step => step.conclusion === 'failure') ?? [];
                if (failed.length) {
                  lines.push(`  - failed: ${failed.map(step => step.name).join(', ')}`);
                }
              }
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 790,
              body: lines.join('\n'),
            });
