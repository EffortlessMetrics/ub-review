name: ub-review/gate

# Dogfood posture: this repo runs its own gate on every PR pass, including
# synchronize — the gate must report on every head SHA because it is the
# required check. Review posting policy lives in .ub-review.toml ([gate]
# post_review_on): opened and ready_for_review post the grouped review;
# synchronize and reopened stay gate-only so push storms do not become an
# inbox tax. The compiler's skip logic still suppresses no-value posts, and
# inline candidates still pass the diff-line guardrails.
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  # OIDC for the post-gate Codecov upload of the coverage sensor's lcov receipt.
  id-token: write

concurrency:
  group: ub-review-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: ub-review/gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # The leased coverage sensor runs `cargo llvm-cov` inside the gate
      # (folded from the standalone coverage workflow).
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run ub-review gate
        uses: ./
        with:
          config: .ub-review.toml
          profile: gh-runner-full
          runtime-profile: gh-runner-full
          mode: intelligent-ci
          run-pass: auto
          # Lease the heavy witness classes so the enabled coverage sensor runs.
          allow-heavy: 'true'
          root: .
          out: target/ub-review
          github-token: ${{ github.token }}
          posting: ${{ github.event_name == 'pull_request' && 'review' || 'artifact-only' }}
          model-mode: auto
          depth: ${{ github.event_name == 'workflow_dispatch' && 'deep' || 'standard' }}
          # provider-policy is deliberately omitted: the action default is
          # auto, which defers to [providers].policy in .ub-review.toml
          # (primary-with-fallback) - the live proof that repo config drives
          # provider routing (D1/D2, spec 0006).
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
          minimax-provider-kind: anthropic
          minimax-model: MiniMax-M3
          opencode-api-key: ${{ secrets.OPENCODE }}
          opencode-model: mimo-v2.5
          opencode-endpoint-kind: auto

      - name: Verify ub-review artifacts
        if: always()
        run: >
          python scripts/verify-bun-review-artifacts.py target/ub-review
          --expected-review-profile ub-review-self
          --expected-repo-kind ub-review

      # Folded from the standalone coverage workflow: same OIDC upload, now
      # pointed at the coverage sensor's lcov receipt under target/ub-review.
      # fail_ci_if_error stays false: with ub-review/gate as the only required
      # check, a codecov.io outage must not block merges — coverage execution
      # truth lives in the sensor receipt; the upload is telemetry.
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: target/ub-review/sensors/coverage/lcov.info
          fail_ci_if_error: false

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ub-review-gate
          path: target/ub-review
          if-no-files-found: error
