name: Action Smoke

on:
  pull_request:
    types: [opened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      run_model_smoke:
        description: Run the MiniMax model smoke with repository secrets.
        required: false
        default: false
        type: boolean
      model_smoke_lane_width:
        description: Bun lane width for manual MiniMax model smoke.
        required: false
        default: '10'
        type: choice
        options:
          - '6'
          - '10'
          - '20'
      model_smoke_max_model_calls:
        description: Maximum model calls for manual MiniMax model smoke.
        required: false
        default: '14'
        type: string
      model_smoke_model_concurrency:
        description: Model concurrency for manual MiniMax model smoke.
        required: false
        default: '8'
        type: string
      model_smoke_expected_ok_lanes:
        description: Minimum successful review lanes expected in the smoke artifact.
        required: false
        default: '10'
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    name: Local action smoke
    if: github.event_name != 'pull_request' || github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: ub-review
        uses: ./
        with:
          preset: bun-ub
          profile: gh-runner
          install-tools: 'false'
          base: HEAD~1
          head: HEAD
          out: target/ub-review-smoke
          posting: review
          github-token: ${{ github.token }}
          model-mode: off
          fail-on-post-error: 'false'

      - name: Verify smoke artifacts
        shell: bash
        env:
          EXPECT_REVIEW_POST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
          SUMMARY_PATH: ${{ steps.ub-review.outputs.summary-path }}
          GITHUB_REVIEW_PATH: ${{ steps.ub-review.outputs.github-review-path }}
          POST_RESULT_PATH: ${{ steps.ub-review.outputs.post-result-path }}
          POST_ERROR_PATH: ${{ steps.ub-review.outputs.post-error-path }}
          POST_PAYLOAD_PATH: ${{ steps.ub-review.outputs.post-payload-path }}
          POST_STDOUT_PATH: ${{ steps.ub-review.outputs.post-stdout-path }}
          POST_STDERR_PATH: ${{ steps.ub-review.outputs.post-stderr-path }}
        run: |
          set -euo pipefail

          test "$SUMMARY_PATH" = "target/ub-review-smoke/running-summary.md"
          test "$GITHUB_REVIEW_PATH" = "target/ub-review-smoke/review/github-review.json"
          test "$POST_RESULT_PATH" = "target/ub-review-smoke/review/post-result.json"
          test "$POST_ERROR_PATH" = "target/ub-review-smoke/review/post-error.json"
          test "$POST_PAYLOAD_PATH" = "target/ub-review-smoke/review/github-review-post-payload.json"
          test "$POST_STDOUT_PATH" = "target/ub-review-smoke/review/post-stdout.json"
          test "$POST_STDERR_PATH" = "target/ub-review-smoke/review/post-stderr.txt"

          test -f "$SUMMARY_PATH"
          GITHUB_REVIEW_SKIP_PATH="${GITHUB_REVIEW_PATH%.json}-skip.json"
          test -f "$GITHUB_REVIEW_PATH" || test -f "$GITHUB_REVIEW_SKIP_PATH"
          if [[ -f "$GITHUB_REVIEW_PATH" && -f "$GITHUB_REVIEW_SKIP_PATH" ]]; then
            echo "::error::both github review payload and skip receipt exist"
            exit 1
          fi

          if [[ "$EXPECT_REVIEW_POST" == "true" ]]; then
            test -f "$POST_RESULT_PATH"
            if [[ -f "$GITHUB_REVIEW_PATH" ]]; then
              test -f "$POST_PAYLOAD_PATH"
              test -f "$POST_STDOUT_PATH"
              test -f "$POST_STDERR_PATH"
            else
              python -c 'import json,sys; from pathlib import Path; receipt=json.loads(Path(sys.argv[1]).read_text()); assert receipt.get("status") == "skipped", receipt' "$POST_RESULT_PATH"
            fi
          else
            test -f "$POST_RESULT_PATH" || test -f "$POST_ERROR_PATH"
          fi

      - name: Verify Bun artifact contract
        run: python scripts/verify-bun-review-artifacts.py target/ub-review-smoke

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ub-review-smoke
          path: target/ub-review-smoke
          retention-days: 7

  model-smoke:
    name: MiniMax model smoke
    if: (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ub-review-model-smoke')) || (github.event_name == 'workflow_dispatch' && inputs.run_model_smoke == true)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./
        with:
          preset: bun-ub
          profile: gh-runner
          install-tools: 'false'
          base: HEAD~1
          head: HEAD
          out: target/ub-review-model-smoke
          posting: review
          github-token: ${{ github.token }}
          model-mode: auto
          provider-policy: minimax-only
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
          minimax-provider-kind: anthropic
          lane-width: ${{ inputs.model_smoke_lane_width || '6' }}
          max-model-calls: ${{ inputs.model_smoke_max_model_calls || '1' }}
          model-concurrency: ${{ inputs.model_smoke_model_concurrency || '1' }}
          max-inline-comments: '2'
          fail-on-post-error: 'false'

      - name: Verify MiniMax smoke artifacts
        run: python scripts/verify-model-smoke-artifacts.py target/ub-review-model-smoke "${EXPECTED_OK_LANES}"
        env:
          EXPECTED_OK_LANES: ${{ inputs.model_smoke_expected_ok_lanes || '1' }}

      - name: Verify Bun artifact contract
        run: >
          python scripts/verify-bun-review-artifacts.py target/ub-review-model-smoke
          --min-ok-model-lanes "${EXPECTED_OK_LANES}"
          --require-no-model-evidence-failures
        env:
          EXPECTED_OK_LANES: ${{ inputs.model_smoke_expected_ok_lanes || '1' }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ub-review-model-smoke
          path: target/ub-review-model-smoke
          retention-days: 7
