name: Action Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      run_model_smoke:
        description: Run the MiniMax model smoke with repository secrets.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    name: Local action smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./
        with:
          preset: bun-ub
          profile: gh-runner
          install-tools: 'false'
          base: HEAD~1
          head: HEAD
          out: target/ub-review-smoke
          posting: review
          github-token: ${{ github.token }}
          model-mode: off
          fail-on-post-error: 'false'

      - name: Verify smoke artifacts
        shell: bash
        env:
          EXPECT_REVIEW_POST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
        run: |
          set -euo pipefail

          test -f target/ub-review-smoke/running-summary.md
          test -f target/ub-review-smoke/review/github-review.json

          if [[ "$EXPECT_REVIEW_POST" == "true" ]]; then
            test -f target/ub-review-smoke/review/post-result.json
          else
            test -f target/ub-review-smoke/review/post-result.json || \
              test -f target/ub-review-smoke/review/post-error.json
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ub-review-smoke
          path: target/ub-review-smoke
          retention-days: 7

  model-smoke:
    name: MiniMax model smoke
    if: (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ub-review-model-smoke')) || (github.event_name == 'workflow_dispatch' && inputs.run_model_smoke == true)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./
        with:
          preset: bun-ub
          profile: gh-runner
          install-tools: 'false'
          base: HEAD~1
          head: HEAD
          out: target/ub-review-model-smoke
          posting: review
          github-token: ${{ github.token }}
          model-mode: auto
          provider-policy: minimax-only
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
          minimax-provider-kind: openai
          max-model-calls: '1'
          model-concurrency: '1'
          max-inline-comments: '2'
          fail-on-post-error: 'false'

      - name: Verify MiniMax smoke artifacts
        run: python scripts/verify-model-smoke-artifacts.py target/ub-review-model-smoke

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ub-review-model-smoke
          path: target/ub-review-model-smoke
          retention-days: 7
