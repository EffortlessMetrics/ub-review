name: Finish PR 758 branch

on:
  push:
    branches: [feat/review-experience-contract]

permissions:
  contents: write

concurrency:
  group: finish-pr-758-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finish:
    if: github.ref_name == 'feat/review-experience-contract'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feat/review-experience-contract
          fetch-depth: 0
          persist-credentials: true

      - name: Verify expected parent
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "43262e2bba92e63022f3b05037efec7d5465b18c"

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy

      - name: Apply bounded review repairs
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}")
              write(path, text.replace(old, new, 1))

          main = read("src/main.rs")
          marker = "    fn summary_only_withheld_terminal_reason_names_policy_and_counts() {"
          start = main.index(marker)
          end = main.index("\n    #[test]", start + len(marker))
          block = main[start:end]
          receipt_line = '        let proof_receipts = vec![test_proof_receipt("discriminating", "ok")];\n'
          lane_line = '        let model_lanes = vec![model_lane_receipt("tests-oracle", "ok")];\n'
          if lane_line not in block:
              if block.count(receipt_line) != 1:
                  raise SystemExit("src/main.rs: summary-policy receipt fixture drifted")
              block = block.replace(receipt_line, receipt_line + lane_line, 1)
          if block.count("            model_lanes: &[],") != 1:
              raise SystemExit("src/main.rs: summary-policy model lane fixture drifted")
          block = block.replace("            model_lanes: &[],", "            model_lanes: &model_lanes,", 1)
          write("src/main.rs", main[:start] + block + main[end:])

          replace_once(
              "src/observations.rs",
              """        || !output.failed_objections.is_empty()\n        || !output.proof_requests.is_empty()\n}""",
              """        || !output.failed_objections.is_empty()\n        || !output.proof_requests.is_empty()\n        || !output.proof_intents.is_empty()\n}""",
          )

          model_exec = read("src/model_exec.rs")
          old_call = """    for intent in output.proof_intents {\n        match validate_proof_intent(lane, intent, proof_intents.len(), model_observations.len()) {\n            Ok(validated_intent) => proof_intents.push(validated_intent),\n            Err(observation) => model_observations.push(observation),\n        }\n    }"""
          new_call = """    for intent in output.proof_intents {\n        match validate_proof_intent(lane, intent, proof_intents.len(), model_observations.len()) {\n            Ok(validated_intent) => proof_intents.push(validated_intent),\n            Err(observation) => model_observations.push(*observation),\n        }\n    }"""
          if model_exec.count(old_call) != 1:
              raise SystemExit("src/model_exec.rs: proof-intent call site drifted")
          model_exec = model_exec.replace(old_call, new_call, 1)
          fn_start = model_exec.index("fn validate_proof_intent(")
          fn_end = model_exec.index("\n#[cfg(test)]", fn_start)
          validator = r'''fn validate_proof_intent(
    lane: &LanePlan,
    intent: ModelProofIntent,
    intent_ordinal: usize,
    observation_ordinal: usize,
) -> std::result::Result<ProofIntent, Box<Observation>> {
    let claim_id = intent.claim_id.trim();
    let question = intent.question.trim();
    let expected_answer_shape = intent.expected_answer_shape.trim();
    let target = intent.target.trim();
    let target_valid = !target.is_empty()
        && !target.starts_with('/')
        && !target.contains("..")
        && !target.contains(":/")
        && !has_shell_control_token(target)
        && !target.chars().any(char::is_whitespace)
        && target.chars().all(|character| {
            character.is_ascii_alphanumeric()
                || matches!(character, '_' | '-' | '.' | ':' | '/')
        });

    let rejection_reason = if claim_id.is_empty() {
        Some("proof intent has empty claim_id")
    } else if question.is_empty() {
        Some("proof intent has empty question")
    } else if expected_answer_shape.is_empty() {
        Some("proof intent has empty expected_answer_shape")
    } else if !target_valid {
        Some("proof intent target is not a safe repository symbol, test, package, or route label")
    } else {
        None
    };

    if let Some(reason) = rejection_reason {
        return Err(Box::new(Observation {
            schema: "observation".to_owned(),
            id: format!("proof-intent-validation-{}-{observation_ordinal}", lane.id),
            lane: lane.id.clone(),
            question: "proof-intent-validation".to_owned(),
            claim: "Model proof intent was rejected by deterministic validation.".to_owned(),
            kind: "missing-evidence".to_owned(),
            status: "open".to_owned(),
            severity: "low".to_owned(),
            confidence: "high".to_owned(),
            path: None,
            line: None,
            fingerprint: sha256_hex(
                format!("{}\\n{}\\n{}\\n{reason}", lane.id, claim_id, target).as_bytes(),
            ),
            evidence: vec![format!(
                "lane={} claim_id={} target={} reason={reason}",
                lane.id,
                truncate_chars(claim_id, 80),
                truncate_chars(target, 120),
            )],
            dedupe_key: format!("proof-intent-validation-{}", lane.id),
            source: "proof-intent-validation".to_owned(),
        }));
    }

    let estimated_value = intent
        .estimated_value
        .as_deref()
        .map(str::trim)
        .filter(|value| matches!(*value, "high" | "medium-high" | "medium" | "low"))
        .unwrap_or("medium")
        .to_owned();
    let digest = sha256_hex(
        format!(
            "{}\n{}\n{}\n{}\n{}\n{}",
            lane.id,
            claim_id,
            question,
            expected_answer_shape,
            intent.proof_kind.key(),
            target
        )
        .as_bytes(),
    );

    Ok(ProofIntent {
        id: format!("intent-model-{}-{}", &digest[..16], intent_ordinal),
        claim_id: claim_id.to_owned(),
        question: truncate_chars(question, 500),
        expected_answer_shape: truncate_chars(expected_answer_shape, 300),
        proof_kind: intent.proof_kind,
        target: target.to_owned(),
        estimated_value,
        requested_by: vec![lane.id.clone()],
        status: "requested".to_owned(),
    })
}
'''
          model_exec = model_exec[:fn_start] + validator + model_exec[fn_end:]

          old_update = """        if let Some(lane) = model_lanes.iter_mut().find(|lane| lane.lane == lane_id)\n            && reconsideration.changed\n            && !reconsideration.conclusion.is_empty()\n        {\n            lane.reason = reconsideration.conclusion.clone();\n            lane.turn = turn;\n        }"""
          if model_exec.count(old_update) != 1:
              raise SystemExit("src/model_exec.rs: reconsideration lane update drifted")
          model_exec = model_exec.replace(
              old_update,
              "        apply_lane_reconsideration_update(model_lanes, &lane_id, &reconsideration, turn);",
              1,
          )
          helper_anchor = "\n/// Apply only exact request-linked reconsiderations to observations."
          helper = r'''
fn apply_lane_reconsideration_update(
    model_lanes: &mut [ModelLaneReceipt],
    lane_id: &str,
    reconsideration: &ReceiptReconsideration,
    turn: u32,
) {
    if !reconsideration.changed || reconsideration.conclusion.is_empty() {
        return;
    }
    if let Some(lane) = model_lanes.iter_mut().find(|lane| lane.lane == lane_id) {
        lane.reason = reconsideration.conclusion.clone();
        lane.turn = turn;
    }
}
'''
          if helper_anchor not in model_exec:
              raise SystemExit("src/model_exec.rs: reconsideration helper anchor drifted")
          model_exec = model_exec.replace(helper_anchor, helper + helper_anchor, 1)

          test_anchor = "    #[test]\n    fn reconsideration_updates_only_exactly_linked_observations() {"
          test_insert = r'''    fn lane_receipt(reason: &str, turn: u32) -> ModelLaneReceipt {
        ModelLaneReceipt {
            lane: "tests-oracle".to_owned(),
            provider: "minimax".to_owned(),
