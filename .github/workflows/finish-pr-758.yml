name: Finish PR 758 branch

on:
  push:
    branches: [feat/review-experience-contract]

permissions:
  contents: write

concurrency:
  group: finish-pr-758-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finish:
    if: github.ref_name == 'feat/review-experience-contract'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feat/review-experience-contract
          fetch-depth: 0
          persist-credentials: true

      - name: Verify expected parent
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "bd08dbad2f6e6990e058747ab1e4868db943ada6"

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy

      - name: Apply bounded review repairs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/finish_pr_758.py
          cargo fmt --all
          git diff --check

      - name: Compile after repairs
        run: cargo check --workspace --all-targets --locked

      - name: Focused terminal-state regression
        run: cargo test --locked --bin ub-review summary_only_withheld_terminal_reason_names_policy_and_counts -- --test-threads=1

      - name: Focused proof-intent regressions
        run: cargo test --locked --bin ub-review proof_intent_validation_rejects_unsafe_targets_and_clamps_value -- --test-threads=1

      - name: Focused reconsideration regressions
        run: cargo test --locked --bin ub-review receipt_reconsideration_tests -- --test-threads=1

      - name: Focused current-head topic regressions
        run: cargo test --locked --bin ub-review review_topics -- --test-threads=1

      - name: Full binary suite
        run: cargo test --locked --bin ub-review -- --test-threads=4

      - name: Artifact verifier self-test
        run: python scripts/verify-bun-review-artifacts.py --self-test

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Policy check
        run: cargo xtask policy-check

      - name: Formatting and diff hygiene
        run: |
          cargo fmt --all -- --check
          git diff --check

      - name: Commit and push exact validated repair
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finish-pr-758.yml
          rm .github/workflows/debug-pr-758.yml
          rm scripts/finish_pr_758.py
          git add \
            docs/PRODUCT_STATE.md \
            docs/REVIEW_BODY_CONTRACT.md \
            src/main.rs \
            src/model_exec.rs \
            src/observations.rs \
            src/review_topics.rs \
            src/tests/validate_tests.rs \
            .github/workflows/finish-pr-758.yml \
            .github/workflows/debug-pr-758.yml \
            scripts/finish_pr_758.py
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(review): close current-head review gaps"
          git push origin HEAD:feat/review-experience-contract
