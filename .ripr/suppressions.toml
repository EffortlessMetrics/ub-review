# Durable RIPR suppressions. Suppressed findings stay visible as suppressed;
# every entry carries owner + reason per the suppression-health contract.
#
# Ledger history (line-keyed ids rot when src/config.rs moves, ripr-swarm#1053):
# - 2026-06-07: removed the probe:src_config.rs:40:call_deletion entry twice.
#   First written for RepoLane (#342, matcher defect ripr-swarm#1052), it
#   silently transferred to IssuesConfig when that struct landed on line 40
#   (PR #346), then went dead entirely when IssuesConfig grew and moved off
#   the line. Three id-instability instances from one file in one day.

[[suppressions]]
kind = "exposure_gap"
finding_id = "probe:src_config.rs:47:call_deletion"
owner = "ub-review/core"
reason = "RIPR reach false-negative (ripr-swarm#1054): no_static_path reported for IssuesConfig.open_cap although issues_toml_parse_pins_exact_field_defaults asserts it on both parse paths and issue_broker_plan_gates_on_mode_allowlist_and_cap pins the cap behavior; the sibling field open_in, asserted by the same test, reaches fine. Line-keyed id currently points at src/config.rs:47 (open_cap); re-verify the target after any edit to config.rs. Remove when the reach analyzer connects sibling fields consistently."

[[suppressions]]
kind = "exposure_gap"
finding_id = "probe:src_config.rs:47:field_construction"
owner = "ub-review/core"
reason = "Same reach false-negative as the call_deletion twin above (ripr-swarm#1054): field_construction probe on IssuesConfig.open_cap, exactly asserted by issues_toml_parse_pins_exact_field_defaults and constructed explicitly in issue_broker_plan_gates_on_mode_allowlist_and_cap. Line-keyed id; re-verify the target after any edit to config.rs."
