# Durable RIPR suppressions. Suppressed findings stay visible as suppressed;
# every entry carries owner + reason per the suppression-health contract.
#
# Ledger history (line-keyed ids rot when src/config.rs moves, ripr-swarm#1053):
# - 2026-06-07 (instance 1-3): the probe:src_config.rs:40 entry was written
#   for RepoLane (#342), silently transferred to IssuesConfig (PR #346),
#   then went dead when the struct moved again.
# - 2026-06-07 (instance 4): the two line-47 open_cap entries went dead when
#   ProvidersConfig was inserted above IssuesConfig. Removed; their
#   underlying gaps are healed structurally - config-parse oracles now live
#   in src/config.rs's own `mod tests`, which fixed every reach-class
#   false negative (7 gaps -> 4 on the same diff).

[[suppressions]]
kind = "exposure_gap"
finding_id = "probe:src_config.rs:946:side_effect"
owner = "ub-review/core"
reason = "RIPR discriminate false-negative (ripr-swarm#1054, second family): side_effect probe on the errors.push(PolicyError) in sanitize_providers_section stays weakly_exposed although the same-file test providers_section_parses_policy_and_receipts_invalid_values pins the push with an exact oracle (errors.len()==1, exact section, detail starts_with + value + vocabulary). Line-keyed id; re-verify the target after any edit to config.rs."

[[suppressions]]
